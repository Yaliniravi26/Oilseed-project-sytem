<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROTECH - Main Shell</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            background: #061609; 
            color: #ecfdf5; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* Sidebar Styling */
        .sidebar { 
            width: 280px; 
            background: #0b2210; 
            border-right: 1px solid rgba(16, 185, 129, 0.2); 
            display: flex; 
            flex-direction: column; 
            padding: 40px 0; 
            position: relative;
        }

        .sidebar h2 { 
            text-align: center; 
            color: #15f3bb; 
            margin-bottom: 40px; 
            letter-spacing: 2px;
        }

        /* Navigation Items */
        .nav-content {
            flex-grow: 1; /* Space between nav and logout */
        }

        .nav-item { 
            padding: 18px 30px; 
            cursor: pointer; 
            color: #6ee7b7; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-weight: 500; 
            transition: 0.3s; 
        }

        .nav-item:hover, .nav-item.active { 
            background: rgba(16, 185, 129, 0.1); 
            color: white; 
            border-left: 5px solid #15f3bb; 
        }

        /* Logout Button - Bottom-la irukka */
        .logout-btn {
            margin-top: auto;
            padding: 18px 30px;
            color: #ff4d4d;
            cursor: pointer;
            border-top: 1px solid rgba(255, 77, 77, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 77, 77, 0.1);
            color: #ff7675;
        }

        iframe { 
            flex: 1; 
            border: none; 
            background: #020a04;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🌱 AGROTECH</h2>
        
        <div class="nav-content">
            <div class="nav-item active" onclick="loadPage('home.html', this)">🏠 Home Dashboard</div>
            <div class="nav-item" onclick="loadPage('stage.html', this)">📊 Stage Analysis</div>
            <div class="nav-item" onclick="loadPage('analytics.html', this)">📈 Detailed Analytics</div>
            <div class="nav-item" onclick="loadPage('history.html', this)">📜 History Log</div>
        </div>

        <div class="logout-btn" onclick="handleLogout()">
            🚪 Log Out
        </div>
    </div>

    <iframe id="content-frame" src="home.html"></iframe>

    <script>
        // Page load panna function
        function loadPage(url, element) {
            const frame = document.getElementById('content-frame');
            
            // iframe source mathura logic
            frame.src = url;

            // Active class-ai mathura logic
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        // Logout function
        function handleLogout() {
            const confirmLogout = confirm("Are you sure you want to log out?");
            
            if (confirmLogout) {
                // LocalStorage-la irukka login details-ai clear pannanum
                localStorage.removeItem('isLoggedIn'); 
                localStorage.removeItem('currentUser');

                // Unga login page name ethuvo athuku redirect pannunga
                window.location.href = "login.html"; 
            }
        }
    </script>
</body>
</html>
