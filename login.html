<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROTECH - Secure Access</title>
    <style>
        :root {
            --bg-dark: #061609;
            --emerald-accent: #15f3bb;
            --text-light: #ecfdf5;
            --glass: rgba(0, 0, 0, 0.75);
            --card-border: rgba(21, 243, 187, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Times New Roman', Times, serif; }
        
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(rgba(6, 22, 9, 0.7), rgba(6, 22, 9, 0.7)), 
                        url('https://images.unsplash.com/photo-1592982537447-7440770cbfc9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            color: var(--text-light); 
            overflow: hidden;
        }

        .login-card {
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            padding: 40px;
            border-radius: 20px; 
            border: 1px solid var(--card-border); 
            width: 420px;
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            color: var(--emerald-accent); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            font-size: 2rem; 
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(21, 243, 187, 0.3);
        }

        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.95rem; margin-bottom: 8px; font-weight: bold; color: var(--emerald-accent); }

        /* Wrapper for password and icon */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%; padding: 14px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--card-border);
            border-radius: 8px; color: white; 
            font-size: 1rem; outline: none; 
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--emerald-accent);
            box-shadow: 0 0 15px rgba(21, 243, 187, 0.2);
        }

        /* Eye Icon Styling */
        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: var(--emerald-accent);
            user-select: none;
            font-size: 1.2rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .btn-login {
            width: 100%; padding: 16px; 
            background: var(--emerald-accent); color: #000;
            border: none; border-radius: 50px; 
            font-weight: 900; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s; 
            margin-top: 15px; text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover { 
            transform: scale(1.03); 
            background: #fff;
            box-shadow: 0 10px 25px rgba(21, 243, 187, 0.5); 
        }

        .options-link { margin-top: 25px; font-size: 0.95rem; display: flex; justify-content: space-between; }
        .options-link a { color: #6ee7b7; text-decoration: none; cursor: pointer; font-style: italic; }
        .options-link a:hover { color: #fff; text-decoration: underline; }

        #signup-section, #reset-section { display: none; }
    </style>
</head>
<body>
    <div class="login-card" style="position: relative; z-index: 10;">
        <div style="font-size: 3.5rem; filter: drop-shadow(0 0 10px var(--emerald-accent));">🌱</div>
        <h2>AGROTECH</h2>
        <p style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 30px; letter-spacing: 1px;">Precision Oilseed Farming Portal</p>

        <div id="login-section">
            <div class="input-group">
                <label>FARMER USERNAME</label>
                <input type="text" id="loginUser" placeholder="Enter Username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPass" placeholder="••••••••">
                    <span class="toggle-password" onclick="togglePasswordVisibility('loginPass')">👁️</span>
                </div>
            </div>
            <button class="btn-login" onclick="handleLogin()">Login to Dashboard</button>
            <div class="options-link">
                <span>New? <a onclick="showSection('signup-section')">Sign Up Here</a></span>
                <a onclick="showSection('reset-section')">Forgot Pass?</a>
            </div>
        </div>

        <div id="signup-section">
            <h3 style="color: var(--emerald-accent); margin-bottom: 20px;">Register New Farmer</h3>
            <div class="input-group">
                <label>CREATE USERNAME</label>
                <input type="text" id="regUser" placeholder="e.g. farmer_01">
            </div>
            <div class="input-group">
                <label>SET PASSWORD</label>
                <div class="password-wrapper">
                    <input type="password" id="regPass" placeholder="••••••••">
                    <span class="toggle-password" onclick="togglePasswordVisibility('regPass')">👁️</span>
                </div>
            </div>
            <button class="btn-login" onclick="handleSignUp()">Create Account</button>
            <br><br>
            <a onclick="showSection('login-section')" style="color: #6ee7b7; cursor: pointer;">← Back to Login</a>
        </div>

        <div id="reset-section">
            <h3 style="color: #f3c615; margin-bottom: 20px;">Account Recovery</h3>
            <div class="input-group"><label>YOUR USERNAME</label><input type="text" id="resUser"></div>
            <div class="input-group">
                <label>NEW PASSWORD</label>
                <div class="password-wrapper">
                    <input type="password" id="resPass" placeholder="••••••••">
                    <span class="toggle-password" onclick="togglePasswordVisibility('resPass')">👁️</span>
                </div>
            </div>
            <button class="btn-login" style="background: #f3c615;" onclick="handleReset()">Reset Password</button>
            <br><br>
            <a onclick="showSection('login-section')" style="color: #6ee7b7; cursor: pointer;">← Back to Login</a>
        </div>

        <div style="margin-top: 35px; font-size: 0.75rem; opacity: 0.5; letter-spacing: 2px;">
            © 2026 AGROTECH | SECURE ACCESS
        </div>
    </div>

    <script>
        function showSection(id) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('reset-section').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        // --- PASSWORD TOGGLE LOGIC ---
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.innerText = "🔒"; // Icon changes when visible
            } else {
                input.type = "password";
                icon.innerText = "👁️";
            }
        }

        function handleSignUp() {
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if(user && pass) {
                localStorage.setItem("user_" + user, pass); 
                alert("Farmer ID '" + user + "' created successfully!");
                showSection('login-section');
            } else { alert("Please enter both username and password!"); }
        }

        function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const savedPass = localStorage.getItem("user_" + user);

            if (savedPass && savedPass === pass) {
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("currentUser", user);
                window.location.href = "index.html"; 
            } else {
                alert("Invalid Credentials! If you are new, please Sign Up.");
            }
        }

        function handleReset() {
            const user = document.getElementById('resUser').value.trim();
            const pass = document.getElementById('resPass').value.trim();
            if(localStorage.getItem("user_" + user)) {
                localStorage.setItem("user_" + user, pass);
                alert("Password Updated! You can now login.");
                showSection('login-section');
            } else { alert("User ID not found in our records!"); }
        }
    </script>
</body>
</html>
