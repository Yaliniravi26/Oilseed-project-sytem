
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WELCOME | AGROTECH SYSTEM</title>
  <style>
    :root {
      --bg-dark: #061609;
      --emerald: #15f3bb;
      --text-light: #ecfdf5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      font-family: 'Times New Roman', Times, serif;
      background: var(--bg-dark);
      color: white;
      overflow: hidden;
    }

    .hero-container {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0b2210 0%, #061609 100%);
    }

    .glass-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 950px;
      padding: 40px;
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: bold;
      color: var(--emerald);
      letter-spacing: 2px;
      line-height: 1.3;
      margin: 0;
      text-transform: uppercase;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
    }

    .subtitle {
      font-size: 1.3rem;
      color: #6ee7b7;
      margin: 30px 0 50px;
      font-style: italic;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .start-btn {
      display: inline-block;
      padding: 18px 65px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #000;
      background: var(--emerald);
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.4s;
      text-transform: uppercase;
      box-shadow: 0 10px 20px rgba(21, 243, 187, 0.3);
    }

    .start-btn:hover { 
      transform: scale(1.05); 
      background: #fff; 
      color: #000; 
    }

    /* small responsive */
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .subtitle { font-size: 1rem; margin: 18px 0 30px; }
    }
  </style>
</head>
<body>

  <div class="hero-container">
    <div class="glass-overlay" aria-hidden="true"></div>
    <div class="content">
      <h1 id="main-title">Oilseed Crop Stress Detection <br>& Yield Prediction System</h1>
      <div class="subtitle" id="main-subtitle">An Advanced Analytical Framework for Precision Agriculture</div>
      <a href="login.html" class="start-btn">Get Started</a>
    </div>
  </div>

</body>
</html>
